<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Township Slots</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-row">
      <div class="brand">township<span class="brand-dot">slots</span></div>
    </div>
  </div>

  <div class="main">

    <div class="hero-line">Book your spot.<br>No queueing, no guessing.</div>
    <div class="hero-sub">Find a local business and grab an open time slot in seconds.</div>

    <div class="section-label">Recent &amp; popular</div>
    <div class="card-row" id="recentCards"></div>

    <div class="section-label">Search a business</div>
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <input type="text" class="search-input" id="searchInput" placeholder="Try 'barber', 'Soweto', 'braids'...">
    </div>
    <div class="search-hint" id="searchHint">Search by name, service or township to see who's open near you.</div>

    <div class="biz-list" id="bizList"></div>

    <div class="register-banner" id="registerBanner">
      <div class="register-banner-text">
        <div class="register-banner-title">Own a business?</div>
        <div class="register-banner-sub">List it free and start taking bookings today.</div>
      </div>
      <div class="register-banner-arrow">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

  </div>

</div>

<script src="app-data.js"></script>
<script>
  const businesses = getBusinesses();

  function renderRecentCards() {
    const wrap = document.getElementById('recentCards');
    const recents = businesses.slice(0, 5);
    wrap.innerHTML = recents.map(b => `
      <div class="biz-card" onclick="goToBusiness('${b.id}')">
        <div class="biz-card-icon">${b.icon}</div>
        <div class="biz-card-name">${b.name}</div>
        <div class="biz-card-meta"><span class="status-dot ${isBusinessOpenNow(b) ? 'open' : 'closed'}"></span>${b.area}</div>
      </div>
    `).join('');
  }

  function renderList(filtered) {
    const list = document.getElementById('bizList');
    const hint = document.getElementById('searchHint');
    if (!filtered) {
      list.innerHTML = '';
      hint.style.display = 'block';
      return;
    }
    hint.style.display = 'none';
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state">No businesses match that search.<br>Try a different name or area.</div>`;
      return;
    }
    list.innerHTML = filtered.map(b => `
      <div class="biz-list-item" onclick="goToBusiness('${b.id}')">
        <div class="biz-list-icon">${b.icon}</div>
        <div class="biz-list-text">
          <div class="biz-list-name">${b.name}</div>
          <div class="biz-list-meta"><span class="status-dot ${isBusinessOpenNow(b) ? 'open' : 'closed'}"></span>${b.category} · ${b.area}</div>
        </div>
        <div class="biz-list-chevron">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { renderList(null); return; }
    const filtered = businesses.filter(b =>
      b.name.toLowerCase().includes(q) ||
      b.category.toLowerCase().includes(q) ||
      b.area.toLowerCase().includes(q)
    );
    renderList(filtered);
  });

  function goToBusiness(id) {
    window.location.href = `business.html?id=${id}`;
  }

  document.getElementById('registerBanner').addEventListener('click', () => {
    window.location.href = 'register.html';
  });

  renderRecentCards();
  renderList(null);
</script>
</body>
</html>
